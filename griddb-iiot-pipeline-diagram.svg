<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 460" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <linearGradient id="db" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5b7"/>
      <stop offset="100%" stop-color="#0b7c8a"/>
    </linearGradient>
  </defs>

  <rect width="980" height="460" fill="#ffffff"/>
  <text x="40" y="48" font-size="24" font-weight="700" fill="#0f172a">Industrial IoT Sensor Pipeline on GridDB</text>
  <text x="40" y="74" font-size="14" fill="#64748b">Java native client · TimeSeries container · time-range + aggregation queries</text>

  <!-- 1. Sensors -->
  <rect x="40" y="150" width="170" height="120" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="125" y="185" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">Industrial Sensors</text>
  <text x="125" y="212" font-size="12.5" fill="#475569" text-anchor="middle">temperature (°C)</text>
  <text x="125" y="232" font-size="12.5" fill="#475569" text-anchor="middle">vibration (mm/s)</text>
  <text x="125" y="252" font-size="12.5" fill="#475569" text-anchor="middle">turbine_01 …</text>

  <line x1="210" y1="210" x2="268" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2. Java ingest -->
  <rect x="270" y="150" width="180" height="120" rx="12" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="360" y="183" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">Java Ingest</text>
  <text x="360" y="205" font-size="12" fill="#9a3412" text-anchor="middle">SensorPipeline.java</text>
  <text x="360" y="230" font-size="12.5" fill="#475569" text-anchor="middle">put(reading)</text>
  <text x="360" y="250" font-size="12.5" fill="#b45309" text-anchor="middle">tag ALERT if vib &gt; 4.0</text>

  <line x1="450" y1="210" x2="508" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3. GridDB -->
  <g>
    <ellipse cx="600" cy="160" rx="90" ry="20" fill="url(#db)"/>
    <path d="M510,160 V260 a90,20 0 0 0 180,0 V160" fill="url(#db)"/>
    <ellipse cx="600" cy="160" rx="90" ry="20" fill="none" stroke="#0b6470" stroke-width="1.5"/>
    <text x="600" y="200" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">GridDB</text>
    <text x="600" y="223" font-size="11.5" fill="#e0f7fa" text-anchor="middle">TimeSeries: turbine_01</text>
    <text x="600" y="241" font-size="11.5" fill="#e0f7fa" text-anchor="middle">@RowKey timestamp</text>
  </g>

  <line x1="690" y1="210" x2="748" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="690" y1="210" x2="748" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="690" y1="210" x2="748" y2="260" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4. Queries -->
  <rect x="750" y="132" width="195" height="56" rx="9" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="847" y="156" font-size="13" font-weight="700" fill="#1e3a8a" text-anchor="middle">Range query</text>
  <text x="847" y="175" font-size="11.5" fill="#475569" text-anchor="middle">query(begin, end)</text>

  <rect x="750" y="196" width="195" height="56" rx="9" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="847" y="220" font-size="13" font-weight="700" fill="#1e3a8a" text-anchor="middle">Aggregation</text>
  <text x="847" y="239" font-size="11.5" fill="#475569" text-anchor="middle">AVG temp · MAX vib</text>

  <rect x="750" y="260" width="195" height="56" rx="9" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="847" y="284" font-size="13" font-weight="700" fill="#1e3a8a" text-anchor="middle">TQL filter</text>
  <text x="847" y="303" font-size="11.5" fill="#475569" text-anchor="middle">WHERE vibration &gt; 4.0</text>

  <!-- 5. Output -->
  <line x1="847" y1="316" x2="847" y2="356" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="700" y="360" width="294" height="58" rx="10" fill="#0f172a"/>
  <text x="847" y="386" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Dashboards &amp; Alerts</text>
  <text x="847" y="406" font-size="11.5" fill="#94a3b8" text-anchor="middle">predictive-maintenance monitoring</text>
</svg>
